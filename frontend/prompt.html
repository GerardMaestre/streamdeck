<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Deck Setup</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            background: transparent !important;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-app-region: drag;
        }

        .prompt-container {
            width: 92%;
            max-width: 480px;
            background: rgba(13, 20, 32, 0.94);
            padding: 20px 25px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: none;
            text-align: center;
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            -webkit-app-region: no-drag;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-sizing: border-box;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .header {
            margin-bottom: 2px;
        }

        h2 {
            margin: 0 0 5px 0;
            font-size: 1.4rem;
            color: var(--accent-cyan);
            text-shadow: 0 2px 10px rgba(102, 212, 255, 0.3);
        }

        p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.3;
        }

        .fields-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px 2px;
            margin: 5px 0;
        }

        /* Scrollbar styling */
        .fields-container::-webkit-scrollbar {
            width: 6px;
        }
        .fields-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            width: 100%;
        }

        .field-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding-left: 2px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.35);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.25s var(--ease-smooth);
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(102, 212, 255, 0.25);
            background: rgba(0, 0, 0, 0.5);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 5px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s var(--ease-smooth);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-cancel:hover { 
            background: rgba(255, 255, 255, 0.12); 
            color: white;
        }

        .btn-submit {
            background: var(--accent-cyan);
            color: #0b111a;
            box-shadow: 0 4px 12px rgba(102, 212, 255, 0.15);
        }

        .btn-submit:hover { 
            filter: brightness(1.1);
            box-shadow: 0 0 20px rgba(102, 212, 255, 0.4);
            transform: translateY(-1px);
        }

        .btn:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="prompt-container">
        <div class="header">
            <h2 id="title">Configuración</h2>
            <p id="description">Introduce los parámetros necesarios.</p>
        </div>
        
        <div class="fields-container" id="fields-container">
            <!-- Fields generated dynamically -->
        </div>

        <div class="actions">
            <button class="btn btn-cancel" id="btn-cancel">Cancelar</button>
            <button class="btn btn-submit" id="btn-submit">Guardar</button>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const electronPrompt = window.electronPrompt;
            const fieldsContainer = document.getElementById('fields-container');
            const btnSubmit = document.getElementById('btn-submit');
            const btnCancel = document.getElementById('btn-cancel');
            const titleEl = document.getElementById('title');
            const descEl = document.getElementById('description');

            let fieldInputs = {};

            const onSetupPrompt = (data) => {
                console.log('[Prompt] Configuración recibida:', data);
                if (data?.title) titleEl.innerText = data.title;
                if (data?.description) descEl.innerText = data.description;
                
                fieldsContainer.innerHTML = '';
                fieldInputs = {};

                const fields = data?.fields || [];
                
                if (fields.length === 0) {
                    fields.push({
                        key: 'value',
                        label: 'Parámetros',
                        placeholder: data?.placeholder || 'Introduce los parámetros aquí...',
                        isSecret: data?.isSecret,
                        defaultValue: ''
                    });
                }

                fields.forEach((field, index) => {
                    const group = document.createElement('div');
                    group.className = 'field-group';
                    
                    const label = document.createElement('label');
                    label.className = 'field-label';
                    label.innerText = field.label || field.key;
                    
                    const wrapper = document.createElement('div');
                    wrapper.className = 'input-wrapper';
                    
                    const input = document.createElement('input');
                    input.type = field.isSecret ? 'password' : 'text';
                    input.placeholder = field.placeholder || '';
                    input.value = field.defaultValue || '';
                    input.dataset.key = field.key;
                    
                    wrapper.appendChild(input);
                    group.appendChild(label);
                    group.appendChild(wrapper);
                    fieldsContainer.appendChild(group);
                    
                    fieldInputs[field.key] = input;

                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') submit();
                        if (e.key === 'Escape') cancel();
                    });
                });

                // Autofocus al primer input con un ligero retraso
                setTimeout(() => {
                    const firstInput = fieldsContainer.querySelector('input');
                    if (firstInput) {
                        firstInput.focus();
                        console.log('[Prompt] Autofocus ejecutado');
                    }
                }, 200);
            };

            if (electronPrompt && typeof electronPrompt.onSetupPrompt === 'function') {
                electronPrompt.onSetupPrompt(onSetupPrompt);
            }

            const submit = () => {
                const results = {};
                let hasEmpty = false;
                Object.keys(fieldInputs).forEach(key => {
                    results[key] = fieldInputs[key].value.trim();
                    if (!results[key]) hasEmpty = true;
                });

                console.log('[Prompt] Intentando enviar resultados:', results);

                if (electronPrompt && typeof electronPrompt.submit === 'function') {
                    const keys = Object.keys(results);
                    if (keys.length === 1 && keys[0] === 'value') {
                        electronPrompt.submit(results.value);
                    } else {
                        electronPrompt.submit(results);
                    }
                } else {
                    console.error('[Prompt] electronPrompt.submit no disponible');
                }
            };

            const cancel = () => {
                console.log('[Prompt] Usuario canceló');
                if (electronPrompt && typeof electronPrompt.cancel === 'function') {
                    electronPrompt.cancel();
                }
            };

            btnSubmit.addEventListener('click', submit);
            btnCancel.addEventListener('click', cancel);
        });
    </script>
</body>
</html>
