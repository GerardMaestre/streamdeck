<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sream Deck Prompt</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: transparent !important;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            margin: 0;
            overflow: hidden;
            -webkit-app-region: drag; /* Permite arrastrar la ventana desde el fondo */
        }

        .prompt-container {
            width: 90%;
            max-width: 450px;
            background: rgba(13, 20, 32, 0.85); /* Un poco más oscuro para que resalte en el PC */
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            text-align: center;
            animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            -webkit-app-region: no-drag; /* Los elementos internos no son arrastrables para permitir interacción */
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            color: var(--text-primary);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        p {
            margin: 0 0 20px 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
            text-align: center;
        }

        input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(102, 212, 255, 0.2);
            background: rgba(0, 0, 0, 0.45);
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .btn-cancel:hover { background: rgba(255, 255, 255, 0.15); }

        .btn-submit {
            background: var(--accent-cyan);
            color: #0b111a;
        }

        .btn-submit:hover { 
            filter: brightness(1.1);
            box-shadow: 0 0 20px rgba(102, 212, 255, 0.4);
        }

        .btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="prompt-container">
        <h2 id="title">Parámetros de Script</h2>
        <p id="description">Introduce el valor solicitado para continuar.</p>
        
        <div class="input-wrapper">
            <input type="text" id="prompt-input" placeholder="Escribe aquí..." autocomplete="off">
        </div>

        <div class="actions">
            <button class="btn btn-cancel" id="btn-cancel">Cancelar</button>
            <button class="btn btn-submit" id="btn-submit">Ejecutar</button>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const electronPrompt = window.electronPrompt;
            const input = document.getElementById('prompt-input');
            const btnSubmit = document.getElementById('btn-submit');
            const btnCancel = document.getElementById('btn-cancel');
            const titleEl = document.getElementById('title');

            const onSetupPrompt = (data) => {
                if (data?.title) titleEl.innerText = data.title;
                const descEl = document.getElementById('description');
                if (descEl) descEl.innerText = data?.description || 'Introduce el valor solicitado para continuar.';
                input.placeholder = data?.placeholder || 'Escribe aquí...';
                input.type = data?.isSecret ? 'password' : 'text';
                input.value = '';
                input.focus();
            };

            if (electronPrompt && typeof electronPrompt.onSetupPrompt === 'function') {
                electronPrompt.onSetupPrompt(onSetupPrompt);
            } else {
                console.warn('Electron prompt API no disponible');
                input.focus();
            }

            const submit = () => {
                if (electronPrompt && typeof electronPrompt.submit === 'function') {
                    electronPrompt.submit(input.value);
                } else {
                    console.error('No se puede enviar el prompt: electronPrompt no está disponible');
                }
            };

            const cancel = () => {
                if (electronPrompt && typeof electronPrompt.cancel === 'function') {
                    electronPrompt.cancel();
                } else {
                    console.error('No se puede cancelar el prompt: electronPrompt no está disponible');
                }
            };

            btnSubmit.addEventListener('click', submit);
            btnCancel.addEventListener('click', cancel);

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') submit();
                if (e.key === 'Escape') cancel();
            });

            // Auto-focus al cargar
            setTimeout(() => input.focus(), 100);
        });
    </script>
</body>
</html>
