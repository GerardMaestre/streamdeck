<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta etiquetas especiales PWA y Apple para mantenerlo a pantalla completa, inmersivo y sin barras de URL -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stream Deck">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Stream Deck Pro</title>
    <!-- Importamos el Manifiesto de PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css?v=5.1">
    <link rel="stylesheet" href="styles/domotica.css?v=5.1">
    <link rel="stylesheet" href="styles/mixer.css?v=5.1">
    <link rel="stylesheet" href="styles/discord.css?v=5.1">
    <link rel="stylesheet" href="styles/autoclicker.css?v=5.1">
</head>
<body>
    <!-- Pantalla Principal -->
    <div id="deck-container" class="grid-container"></div>

    <!-- Contenedores de Paneles (CACHÉ) -->
    <div id="panels-container" class="panels-container hidden">
        <div id="panel-mixer" class="panel-cache-node hidden"></div>
        <div id="panel-discord" class="panel-cache-node hidden"></div>
        <div id="panel-domotica" class="panel-cache-node hidden"></div>
        <div id="panel-autoclicker" class="panel-cache-node hidden"></div>
    </div>

    <!-- Overlay/Popover Modal -->
    <div id="overlay" class="overlay hidden">
        <div id="overlay-container" class="grid-container"></div>
    </div>

    <!-- Parameter Modal (Estilo Premium) -->
    <div id="parameter-modal" class="parameter-modal hidden">
        <div class="parameter-modal-content glass">
            <h3 id="parameter-title">Parámetros Requeridos</h3>
            <p id="parameter-description">Introduce los argumentos para ejecutar este script.</p>
            <input type="text" id="parameter-input" class="parameter-input" placeholder="Ej: un_valor --flag" autocomplete="off" spellcheck="false" />
            <div class="parameter-actions">
                <button id="parameter-cancel" type="button" class="parameter-btn btn-cancel">Cancelar</button>
                <button id="parameter-submit" type="button" class="parameter-btn btn-submit">Aceptar</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="dist/app.bundle.js"></script>
</body>
</html>
