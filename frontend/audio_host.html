<!DOCTYPE html>
<html>
<head><title>Audio Engine</title></head>
<body style="background:#000; color:#fff;">
    <p>StreamDeck Pro — Audio Engine Operativo</p>
    <script>
        const activeSounds = new Set();
        
        async function refreshDevices() {
            try {
                const list = await window.audioEngine.getDevices();
                window.audioEngine.sendDevices({
                    devices: list,
                    supportsSinkSelection: window.audioEngine.supportsSinkSelection()
                });
            } catch (e) { console.error("Error al enumerar dispositivos:", e); }
        }

        window.audioEngine.onPlay(async ({ url, sinkId, volume = 1.0 }) => {
            try {
                const audio = new Audio(url);
                audio.volume = Math.min(1, Math.max(0, volume));
                
                // Intentar setear el dispositivo de salida si fue proveído
                if (sinkId && typeof audio.setSinkId === 'function') {
                    try {
                        await audio.setSinkId(sinkId);
                    } catch(err) {
                        console.warn("No se pudo cambiar el SinkID:", err);
                    }
                }

                activeSounds.add(audio);
                audio.onended = () => {
                    activeSounds.delete(audio);
                    audio.remove();
                };
                audio.onerror = () => {
                    activeSounds.delete(audio);
                    audio.remove();
                };

                await audio.play();
            } catch (err) {
                console.error("Fallo de reproducción:", err);
            }
        });

        window.audioEngine.onStopAll(() => {
            activeSounds.forEach(a => {
                try { a.pause(); } catch(e){}
                a.remove();
            });
            activeSounds.clear();
        });

        window.audioEngine.onRefreshDevices(refreshDevices);

        // Disparar refresco inicial tras 1s para asegurar que los permisos/drivers cargaron
        setTimeout(refreshDevices, 1500);
    </script>
</body>
</html>
