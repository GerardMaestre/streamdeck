<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta etiquetas especiales PWA y Apple para mantenerlo a pantalla completa, inmersivo y sin barras de URL -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stream Deck">

<meta name="mobile-web-app-capable" content="yes">
    <title>Stream Deck Pro</title>
    <!-- Importamos el Manifiesto de PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css?v=2.8">
    <link rel="stylesheet" href="css/domotica.css?v=2.8">
    <link rel="stylesheet" href="css/mixer.css?v=2.8">
    <link rel="stylesheet" href="css/discord.css?v=2.8">

    <style>
        /* INLINE CSS PARA EVITAR CACHE EN TABLETS */
        .panel-back-btn-sketch-circle {
            position: fixed !important;
            top: 25px !important;
            right: 30px !important;
            width: 80px !important;
            height: 80px !important;
            flex: none !important;
            aspect-ratio: 1 / 1 !important;
            border-radius: 50% !important;
            background: rgba(30, 41, 59, 0.92) !important;
            border: 3px solid rgba(255, 255, 255, 0.3) !important;
            color: white !important;
            font-size: 3rem !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
            z-index: 10000 !important;
            backdrop-filter: blur(14px) !important;
            -webkit-backdrop-filter: blur(14px) !important;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
            box-shadow: 0 12px 48px rgba(0,0,0,0.6) !important;
            padding: 0 !important;
            overflow: hidden !important;
            -webkit-appearance: none;
        }
        .panel-back-btn-sketch-circle:active {
            transform: scale(0.92) !important;
            background: #1e293b !important;
        }
        .panel-back-btn-sketch-circle span {
            line-height: 1 !important;
            display: block !important;
            pointer-events: none !important;
            transform: translateY(-5px) !important; /* SUBIENDO UN POQUITO MÁS */
            margin: 0 !important;
            padding: 0 !important;
            font-weight: bold !important;
        }
    </style>
</head>
<body>
    <!-- Pantalla Principal -->
    <div id="deck-container" class="grid-container"></div>

    <!-- Overlay/Popover Modal -->
    <div id="overlay" class="overlay hidden">
        <div id="overlay-container" class="grid-container"></div>
    </div>

    <!-- Execution Modal (Dynamic Island style) -->
    <div id="execution-modal" class="execution-modal hidden">
        <div class="execution-header">
            <span id="execution-spinner" class="spinner">⚙️</span>
            <h3 id="execution-title">Ejecutando...</h3>
        </div>
        <div id="execution-logs" class="execution-logs"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js?v=2.8"></script>
</body>
</html>
