name: Compilar Stream Deck Pro

# Esto le dice a GitHub que ejecute la compilación cada vez que hagas "push" 
# a la rama "main" o "master".
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # IMPORTANTE: Usamos windows-latest porque dependes de librerías nativas 
    # de audio de Windows (native-sound-mixer). ¡Debe compilarse en Windows!
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - name: Descargar el código fuente
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Instalar dependencias
      run: npm install

    - name: Preparar archivos para compilación
      shell: pwsh
      run: |
        if (!(Test-Path .env)) { 
          "SECURITY_TOKEN=CasaGerard`nPORT=3000" | Out-File -FilePath .env -Encoding utf8 
        }
        if (!(Test-Path config.json)) { 
          if (Test-Path config.example.json) {
            Copy-Item config.example.json config.json
          } else {
            '{"pages": {"main": []}, "carouselPages": ["main"]}' | Out-File -FilePath config.json -Encoding utf8
          }
        }
        if (!(Test-Path data)) { New-Item -Path data -ItemType Directory }
        if (!(Test-Path data/state.json)) { "{}" | Out-File -FilePath data/state.json -Encoding utf8 }

    - name: Compilar ejecutable con Electron Builder
      # Electron-builder se encargará de reconstruir los módulos nativos aquí.
      run: npm run build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Subir el .exe para descargar (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: StreamDeckPro-Windows-EXE
        path: dist/*.exe
        retention-days: 7

    - name: Crear Release de GitHub
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        files: dist/*.exe
        tag_name: v1.0.${{ github.run_number }}
        name: Stream Deck Pro v1.0.${{ github.run_number }}
        body: |
          Compilación automática de Stream Deck Pro.
          Versión: 1.0.${{ github.run_number }}
          Fecha: ${{ github.event.head_commit.timestamp }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}