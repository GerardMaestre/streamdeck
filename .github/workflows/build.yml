name: Compilar Stream Deck Pro

# Esto le dice a GitHub que ejecute la compilación cada vez que hagas "push" 
# a la rama "main" o "master".
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # IMPORTANTE: Usamos windows-latest porque dependes de librerías nativas 
    # de audio de Windows (native-sound-mixer). ¡Debe compilarse en Windows!
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - name: Descargar el código fuente
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Versión requerida por @electron/rebuild y otras dependencias
        cache: 'npm'

    - name: Instalar dependencias
      run: npm install

    - name: Compilar ejecutable con Electron Builder
      run: npm run build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Subir el .exe para descargar (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: StreamDeckPro-Windows-EXE
        path: dist/*.exe
        retention-days: 7

    - name: Crear Release de GitHub
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        files: dist/*.exe
        tag_name: v1.0.${{ github.run_number }}
        name: Stream Deck Pro v1.0.${{ github.run_number }}
        body: |
          Compilación automática de Stream Deck Pro.
          Versión: 1.0.${{ github.run_number }}
          Fecha: ${{ github.event.head_commit.timestamp }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}